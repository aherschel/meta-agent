      baseline_pool_path: experience/.cache/tau3_baseline_cache_v1.jsonl
      timeout_s: 180
      position_seed: 42

  # Dev smoke: 2 tasks × frozen-judge reward. Lets us exercise the full
  # Stage-2 reward path end-to-end before burning $200 on the real run.
  search-judge-v1-smoke:
    user_model: gpt-4.1
    task_ids: ["0", "1"]
    judge_as_reward:
      config_path: harnesses/tau3_judge_champion_v1
      baseline_pool_path: experience/.cache/tau3_baseline_cache_v1.jsonl
      timeout_s: 180
      position_seed: 42

  # ---- Stage-3 close-the-loop experiment (pointwise evaluator reward) ----
  #
  # Uses the same v2 balanced task split as the pointwise evaluator result:
  #   train: 25 tasks, val: 9 tasks, test: 9 tasks.
  # Train/val rewards come only from a frozen pointwise scalar evaluator.
  # The test split is official τ³ grading only and should be used through
  # `--final-test`, never as a search/acceptance benchmark.
  #
  # All Stage-3 splits use the same user simulator family as the v2 trajectory
  # pool (`airline_pool_v2_all_manifest.json`: user_model=gpt-4o). In Modal,
  # gpt-4o is routed through the Azure OpenAI deployment via LiteLLM
  # (`user_model_provider: azure` -> `azure/gpt-4o`).
  agent-v2-train-j0:
    user_model: gpt-4o
    user_model_provider: azure
    task_ids:
      [
        "0",
        "1",
        "3",
        "6",
        "9",
        "11",
        "12",
        "15",
        "16",
        "18",
        "20",
        "21",
        "25",
        "27",
        "28",
        "30",
        "31",
        "32",
        "34",
        "36",
        "37",
        "38",
        "40",
        "43",
        "45",
      ]
    pointwise_judge_reward:
      config_path: harnesses/reward_models/tau3_airline_trajectory/pointwise_scorer
      model: claude-haiku-4-5
      timeout_s: 180
      min_score: 1
      max_score: 100
      pass_threshold: 0.5

  agent-v2-val-j0:
    user_model: gpt-4o
    user_model_provider: azure
