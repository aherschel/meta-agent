  # ---- Experiment A Stage-2 (actor harness-tuning with frozen judge reward) ----
  # Reward-via-judge: each rollout's reward = 1 iff the frozen Stage-1 champion
  # judge (harnesses/tau3_judge_champion_v1) picks the candidate trajectory over
  # the cached vanilla-Haiku baseline trajectory. Position-randomized per task
  # (coin flip seeded by task_id). See docs/internal/EXPERIMENT_A_TASK_SUCCESS_PLAN.md §6.
  #
  # All three splits override `user_model: gpt-4.1` so candidate rollouts use
  # the SAME user simulator as the cached baseline AND the Stage-1 judge
  # training pool. Mismatching the user simulator puts trajectories
  # out-of-distribution from what the judge was trained on.
  #
  # Baseline pool must be populated before first use via
  # `modal run meta_agent/cloud/modal_runner.py::cache_baseline_tau3` (generates
  # experience/.cache/tau3_baseline_cache_v1.jsonl on the Modal volume).
  search-judge-v1:
    user_model: gpt-4.1
    task_ids:
      [
        "0",
        "1",
        "3",
        "4",
        "5",
        "7",
        "8",
        "9",
        "12",
        "13",
        "14",
        "15",
        "17",
        "18",
        "19",
        "20",
        "21",
        "24",
        "25",
        "26",
        "27",
        "29",
        "30",
        "31",
        "32",
        "33",
        "35",
        "36",
        "37",
        "39",
        "40",
        "41",
        "43",
        "45",
        "47",
      ]
    judge_as_reward:
      config_path: harnesses/tau3_judge_champion_v1
      baseline_pool_path: experience/.cache/tau3_baseline_cache_v1.jsonl
      timeout_s: 180
      position_seed: 42

  # Actor-holdout for Stage-2 final eval (same 15 held-out airline tasks as
  # `holdout`, graded via the same Stage-1 champion judge).
  holdout-judge-v1:
    user_model: gpt-4.1
    task_ids:
      [
        "2",
        "6",
        "10",
        "11",
        "16",
        "22",
        "23",
        "28",
        "34",
        "38",
        "42",
