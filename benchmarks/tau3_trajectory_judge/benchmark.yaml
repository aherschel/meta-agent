name: tau3_trajectory_judge
type: tau3_trajectory_judge
description: >-
  Stage 1 of Experiment A (see docs/internal/EXPERIMENT_A_TASK_SUCCESS_PLAN.md):
  harness-tune a frozen Claude Haiku 4.5 pairwise task-success judge on
  τ²-labeled τ³-airline trajectory pairs. Each split references a pool JSONL
  produced by `benchmarks/tau3_trajectory_judge/build_pool.py` and filters
  records by the per-record `task_split` annotation. Adapter materializes
  within-task (pass × fail) Cartesian pairs, caps per task, and dispatches
  through `meta_agent.task_runner.judge_runner::run_judge_benchmark`
  (pairwise `submit_verdict` MCP tool).

backend:
  max_pairs_per_task: 12
  position_swap: true # evaluate each pair under both orderings
  pair_sampling_seed: 42
  timeout: 720

splits:
  # ---- adapter dev smoke (6-rollout mini pool; typically 1-2 pairs) ----
  # Uses position_swap=false to keep the end-to-end smoke cheapest (one judge
  # call per pair); production splits flip this back to true.
  smoke:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_smoke.jsonl
    task_split: judge-train
    position_swap: false
    timeout: 120

  # ---- production splits (generated by build_pool.py, gitignored) ----
  #
  # Canonical 28/7 task-level split of tau3:search, computed deterministically
  # via `random.Random(42).sample(search_ids, 7)`:
  #   judge-train (28): 0,3,4,7,8,12,13,14,15,17,18,19,21,25,26,27,29,30,32,33,35,36,37,39,40,41,43,45
  #   judge-val  (7):   1,5,9,20,24,31,47
  # The tau3:holdout set (2,6,10,11,16,22,23,28,34,38,42,44,46,48,49) is
  # never used during Stage 1 — it's reserved for actor-holdout final eval.

  judge-train:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v1_train.jsonl
    task_split: judge-train

  judge-train-fast:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v1_train.jsonl
    task_split: judge-train
    task_ids: ["3", "19", "41"]

  # judge-val is the acceptance gate + headline metric (§5 of the plan).
  judge-val:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v1_val.jsonl
    task_split: judge-val

  # judge-test is the untouched final-test split for the Stage-1 judge.
  # Do not use it for proposal selection or acceptance.
  judge-test:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v1_test.jsonl
    task_split: judge-test

  # ---- judge-stratified v2 task-level splits for pointwise/scalar reward experiments ----
  #
  # These splits all read the repaired v2 pool and filter by task_ids. They use
  # only pairable core tasks (at least one pass and one fail trajectory), with
  # matched difficulty mix, matched pool pass-rate, and matched baseline judge
  # difficulty. This replaces the first balanced-core draft because baseline
  # judge accuracy exposed a train-heavy hard-task skew.
  #   train: 25 tasks, 300 capped pairs, pool pass 57.05%, baseline 70.0%
  #   val:    9 tasks, 108 capped pairs, pool pass 57.16%, baseline 69.4%
  #   test:   9 tasks, 108 capped pairs, pool pass 57.13%, baseline 69.4%
  # Manifest: benchmarks/tau3_trajectory_judge/split_manifest_v2_balanced_judge.json

  judge-v2-balanced-train:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v2_all_repaired.jsonl
    task_split: judge-v2-all
    task_ids:
      ["0", "1", "3", "6", "9", "11", "12", "15", "16", "18", "20", "21", "25", "27", "28", "30", "31", "32", "34", "36", "37", "38", "40", "43", "45"]

  judge-v2-balanced-val:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v2_all_repaired.jsonl
    task_split: judge-v2-all
    task_ids:
      ["5", "8", "13", "17", "19", "22", "26", "35", "48"]

  judge-v2-balanced-test:
    pool_path: benchmarks/tau3_trajectory_judge/data/airline_pool_v2_all_repaired.jsonl
    task_split: judge-v2-all
    task_ids:
      ["2", "4", "7", "10", "33", "41", "42", "47", "49"]
